<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cisco Networking Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#050d1a;--surface:#0a1628;--surface2:#0f1f35;--border:#1a3050;--accent:#00d4ff;--accent2:#0066ff;--green:#00e676;--red:#ff4444;--yellow:#ffb300;--text:#e0f0ff;--muted:#4a7090;--glow:0 0 30px rgba(0,212,255,0.15)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,102,255,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,212,255,0.06) 0%,transparent 50%);pointer-events:none;z-index:0}
  .container{max-width:880px;margin:0 auto;padding:40px 24px 80px;position:relative;z-index:1}

  /* Header */
  .header{text-align:center;margin-bottom:48px;animation:fadeDown 0.7s ease both}
  .tag{display:inline-flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);border:1px solid rgba(0,212,255,0.3);background:rgba(0,212,255,0.05);padding:6px 16px;border-radius:100px;margin-bottom:20px}
  .tag::before{content:'●';animation:blink 1.5s infinite}
  h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;line-height:1.1;margin-bottom:12px}
  h1 span{background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header p{color:var(--muted);font-size:14px;font-family:'Space Mono',monospace}

  /* Welcome */
  .welcome{text-align:center;animation:fadeUp 0.5s ease both}
  .welcome.hide{display:none}
  .total-info{display:inline-block;font-family:'Space Mono',monospace;font-size:12px;color:var(--accent);background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);padding:6px 16px;border-radius:6px;margin-bottom:28px}
  .mode-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:32px}
  .mode-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:20px 12px;cursor:pointer;transition:all 0.2s}
  .mode-card:hover,.mode-card.active{border-color:var(--accent);background:rgba(0,212,255,0.07);box-shadow:0 0 20px rgba(0,212,255,0.1)}
  .mode-card .icon{font-size:28px;margin-bottom:8px;display:block}
  .mode-card .name{font-weight:700;font-size:14px;margin-bottom:3px}
  .mode-card .desc{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
  .start-btn{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;padding:16px 48px;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(0,102,255,0.3)}
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,102,255,0.4)}

  /* Stats */
  .stats-bar{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap}
  .stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'Space Mono',monospace;font-size:11px;flex:1;text-align:center;min-width:65px}
  .stat-chip .val{display:block;font-size:20px;font-weight:700;color:var(--accent);margin-bottom:2px}
  .stat-chip .lbl{color:var(--muted);font-size:9px;letter-spacing:1px;text-transform:uppercase}

  /* Progress */
  .progress-wrap{margin-bottom:28px}
  .progress-top{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:8px}
  .progress-track{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}

  /* Question Card */
  .q-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px;margin-bottom:20px;box-shadow:var(--glow);animation:slideIn 0.35s ease both;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .q-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:3px;margin-bottom:14px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .q-num::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,212,255,0.2),transparent)}
  .q-text{font-size:16px;font-weight:600;line-height:1.65;color:var(--text);margin-bottom:24px;white-space:pre-wrap}
  .multi-badge{display:inline-flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:10px;background:rgba(0,212,255,0.1);color:var(--accent);border:1px solid rgba(0,212,255,0.25);padding:3px 10px;border-radius:100px;margin-bottom:16px}

  /* Options */
  .options{display:flex;flex-direction:column;gap:9px}
  .opt-btn{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:11px;cursor:pointer;transition:all 0.18s ease;text-align:left;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;line-height:1.5;width:100%}
  .opt-btn:hover:not(:disabled){border-color:rgba(0,212,255,0.4);background:rgba(0,212,255,0.06);transform:translateX(3px)}
  .opt-btn.selected{border-color:var(--accent);background:rgba(0,212,255,0.1)}
  .opt-btn.correct{border-color:var(--green);background:rgba(0,230,118,0.08)}
  .opt-btn.wrong{border-color:var(--red);background:rgba(255,68,68,0.08)}
  .opt-btn.show-correct{border-color:var(--green);background:rgba(0,230,118,0.05)}
  .opt-letter{display:flex;align-items:center;justify-content:center;width:26px;height:26px;min-width:26px;border-radius:7px;background:var(--border);font-family:'Space Mono',monospace;font-size:11px;font-weight:700;transition:all 0.18s}
  .opt-btn.selected .opt-letter{background:var(--accent);color:#000}
  .opt-btn.correct .opt-letter{background:var(--green);color:#000}
  .opt-btn.wrong .opt-letter{background:var(--red);color:#fff}
  .opt-btn.show-correct .opt-letter{background:var(--green);color:#000}
  .opt-icon{margin-left:auto;font-size:15px;min-width:18px;text-align:right}

  /* Explanation */
  .expl{margin-top:18px;padding:14px 16px;background:rgba(0,212,255,0.05);border-left:2px solid var(--accent);border-radius:0 8px 8px 0;font-family:'Space Mono',monospace;font-size:12px;color:#7ab8d0;line-height:1.7;display:none}
  .expl.show{display:block;animation:fadeUp 0.3s ease}

  /* Controls */
  .controls{display:flex;gap:10px;margin-top:20px}
  .btn{padding:13px 24px;border-radius:10px;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.18s;letter-spacing:0.3px}
  .btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;flex:1}
  .btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
  .btn-primary:disabled{opacity:0.35;cursor:not-allowed;transform:none}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}
  .btn-secondary:hover{border-color:var(--accent)}

  /* Result */
  .result{text-align:center;display:none}
  .result.show{display:block;animation:fadeUp 0.6s ease both}
  .result-emoji{font-size:70px;margin-bottom:14px;display:block;animation:pop 0.5s ease}
  .result-pct{font-size:clamp(3rem,9vw,5.5rem);font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
  .result-sub{font-family:'Space Mono',monospace;color:var(--muted);font-size:13px;margin-bottom:28px}
  .rank-badge{display:inline-block;padding:8px 28px;border-radius:100px;font-weight:800;font-size:17px;margin-bottom:32px;color:#fff}
  .result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:36px}
  .res-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px}
  .res-item .big{font-size:1.9rem;font-weight:800;margin-bottom:4px}
  .res-item .sm{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .res-item.c .big{color:var(--green)}
  .res-item.w .big{color:var(--red)}
  .res-item.s .big{color:var(--yellow)}
  .result-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

  /* Review */
  .review-hdr{text-align:left;font-size:18px;font-weight:800;margin:44px 0 18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .rev-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:10px}
  .rev-item.ok{border-left:3px solid var(--green)}
  .rev-item.ng{border-left:3px solid var(--red)}
  .rev-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.5;display:flex;gap:8px}
  .rev-n{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);white-space:nowrap;margin-top:2px}
  .rev-ans{display:flex;gap:6px;flex-wrap:wrap}
  .ans-tag{padding:3px 9px;border-radius:4px;font-size:10px;font-family:'Space Mono',monospace}
  .ans-tag.right{background:rgba(0,230,118,0.12);color:var(--green)}
  .ans-tag.wrong{background:rgba(255,68,68,0.12);color:var(--red)}
  .ans-tag.correct{background:rgba(0,230,118,0.08);color:var(--green);border:1px solid rgba(0,230,118,0.25)}

  @keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
  @keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  @media(max-width:580px){.q-card{padding:22px 16px}.controls{flex-direction:column}.mode-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="tag">CISCO NETWORKING</div>
    <h1><span>Network Quiz</span></h1>
    <p>CCNA Fundamentals — Ôn tập trắc nghiệm</p>
  </div>

  <!-- Welcome -->
  <div class="welcome" id="welcome">
    <div class="total-info" id="totalInfo"></div>
    <div class="mode-grid" id="modeGrid">
      <div class="mode-card active" data-n="10"><span class="icon">⚡</span><div class="name">10 câu</div><div class="desc">Quick</div></div>
      <div class="mode-card" data-n="20"><span class="icon">🎯</span><div class="name">20 câu</div><div class="desc">Standard</div></div>
      <div class="mode-card" data-n="30"><span class="icon">🔥</span><div class="name">30 câu</div><div class="desc">Challenge</div></div>
      <div class="mode-card" data-n="50"><span class="icon">💪</span><div class="name">50 câu</div><div class="desc">Hard</div></div>
      <div class="mode-card" data-n="0"><span class="icon">💀</span><div class="name">Tất cả</div><div class="desc">Full exam</div></div>
    </div>
    <button class="start-btn" id="startBtn">Bắt đầu →</button>
  </div>

  <!-- Quiz -->
  <div id="quiz" style="display:none">
    <div class="stats-bar">
      <div class="stat-chip"><span class="val" id="sCur">1</span><span class="lbl">Câu</span></div>
      <div class="stat-chip"><span class="val" id="sTotal">—</span><span class="lbl">Tổng</span></div>
      <div class="stat-chip"><span class="val" id="sOk" style="color:var(--green)">0</span><span class="lbl">Đúng</span></div>
      <div class="stat-chip"><span class="val" id="sWrong" style="color:var(--red)">0</span><span class="lbl">Sai</span></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top"><span id="pLabel">Câu 1</span><span id="pPct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    </div>
    <div class="q-card" id="qCard">
      <div class="q-num" id="qNum">QUESTION 01</div>
      <div class="q-text" id="qText"></div>
      <div id="multiBadge"></div>
      <div class="options" id="opts"></div>
      <div class="expl" id="expl"></div>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" id="skipBtn">Bỏ qua</button>
      <button class="btn btn-primary" id="submitBtn" disabled>Xác nhận</button>
      <button class="btn btn-primary" id="nextBtn" style="display:none">Tiếp theo →</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <span class="result-emoji" id="rEmoji">🎉</span>
    <div class="result-pct" id="rPct">—</div>
    <div class="result-sub" id="rSub"></div>
    <div class="rank-badge" id="rBadge"></div>
    <div class="result-grid">
      <div class="res-item c"><div class="big" id="rOk">0</div><div class="sm">ĐÚNG</div></div>
      <div class="res-item w"><div class="big" id="rWr">0</div><div class="sm">SAI</div></div>
      <div class="res-item s"><div class="big" id="rSk">0</div><div class="sm">BỎ QUA</div></div>
    </div>
    <div class="result-btns">
      <button class="btn btn-secondary" id="reviewBtn">Xem lại đáp án</button>
      <button class="btn btn-primary" id="restartBtn">Làm lại</button>
    </div>
    <div id="reviewSection" style="display:none">
      <div class="review-hdr">📋 Chi tiết đáp án</div>
      <div id="reviewList"></div>
    </div>
  </div>

</div>

<script>
const Q=[
// === TRANSPORT LAYER ===
{q:"What is the primary responsibility of the transport layer?",o:["A. Formatting, or presenting, data into a compatible format.","B. Tracking individual conversations and segmenting data.","C. Translating domain names to IP addresses.","D. Securing the network from external threats."],a:["B"]},
{q:"What are three responsibilities of the transport layer? (Choose three.)",o:["A. meeting the reliability requirements of applications, if any","B. multiplexing multiple communication streams from many users or applications on the same network","C. identifying the applications and services on the client and server that should handle transmitted data","D. directing packets towards the destination network","E. formatting data into a compatible form for receipt by the destination devices","F. conducting error detection of the contents in frames"],a:["A","B","C"],m:true},
{q:"What is the primary responsibility of the transport layer in the OSI model?",o:["A. Routing data packets between networks","B. Managing logical communications between applications on different hosts","C. Defining physical media and connections","D. Encrypting data before transmission"],a:["B"]},
{q:"Which scenario describes a function provided by the transport layer?",o:["A. A student is using a classroom VoIP phone to call home. The unique identifier burned into the phone is a transport layer address used to contact another network device on the same network.","B. A student is playing a short web-based movie with sound. The movie and sound are encoded within the transport layer header.","C. A student has two web browser windows open in order to access two web sites. The transport layer ensures the correct web page is delivered to the correct browser window.","D. A corporate worker is accessing a web server located on a corporate network. The transport layer formats the screen so the web page appears properly no matter what device is being used to view the web site."],a:["C"]},
{q:"Which factor determines TCP window size?",o:["A. the amount of data to be transmitted","B. the number of services included in the TCP segment","C. the amount of data the destination can process at one time","D. the amount of data the source is capable of sending at one time"],a:["C"]},
{q:"What is the purpose of the TCP three-way handshake?",o:["A. To establish connection state and sequence tracking","B. To check the integrity of data sent","C. To open multiple sockets between client and server","D. To notify the server of a new port number"],a:["A"]},
{q:"Which three fields are used in a UDP segment header? (Choose three.)",o:["A. Window Size","B. Length","C. Source Port","D. Acknowledgment Number","E. Checksum","F. Sequence Number"],a:["B","C","E"],m:true},
{q:"Which two fields are the same in a TCP and UDP header? (Choose two.)",o:["A. Control bits","B. Destination port number","C. Sequence number","D. Source port number","E. Well-known port number"],a:["B","D"],m:true},
{q:"What does a client do when it has UDP datagrams to send?",o:["A. It just sends the datagrams.","B. It queries the server to see if it is ready to receive data.","C. It sends a simplified three-way handshake to the server.","D. It sends to the server a segment with the SYN flag set to synchronize the conversation."],a:["A"]},
{q:"What type of applications are best suited for using UDP?",o:["A. applications that are sensitive to delay","B. applications that need reliable delivery","C. applications that require retransmission of lost segments","D. applications that are sensitive to packet loss"],a:["A"]},
{q:"Why is UDP desirable for protocols that make a simple request and reply transactions?",o:["A. Flow control","B. Low overhead","C. Reliability","D. Same-order delivery"],a:["B"]},
{q:"What is a primary characteristic of the UDP protocol?",o:["A. Connection-oriented communication","B. Guaranteed delivery of data","C. Minimal overhead with no error checking","D. Flow control and congestion avoidance"],a:["C"]},
{q:"Which three statements characterize UDP? (Choose three.)",o:["A. UDP provides basic connectionless transport layer functions.","B. UDP provides connection-oriented, fast transport of data at Layer 3.","C. UDP relies on application layer protocols for error detection.","D. UDP is a low overhead protocol that does not provide sequencing or flow control mechanisms.","E. UDP relies on IP for error detection and recovery.","F. UDP provides sophisticated flow control mechanisms."],a:["A","C","D"],m:true},
{q:"Which protocol at the transport layer provides reliable data delivery with error checking and flow control?",o:["A. UDP","B. TCP","C. IP","D. ICMP"],a:["B"]},
{q:"Which two applications would use the TCP transport layer protocol? (Choose two.)",o:["A. FTP","B. HTTP","C. ICMP","D. TFTP","E. VoIP"],a:["A","B"],m:true},
{q:"Which three application layer protocols use TCP? (Choose three.)",o:["A. SMTP","B. FTP","C. SNMP","D. HTTP","E. TFTP","F. DHCP"],a:["A","B","D"],m:true},
{q:"To which TCP port group does the port 414 belong?",o:["A. Registered","B. well-known","C. private or dynamic","D. public"],a:["A"]},
{q:"Which port number range is designated for well-known ports?",o:["A. 0 to 1023","B. 1024 to 49151","C. 49152 to 65535","D. 65536 to 131071"],a:["A"]},
{q:"How are port numbers used in the TCP/IP encapsulation process?",o:["A. Source port numbers and destination port numbers are not necessary when UDP is the transport layer protocol being used.","B. Source port and destination port numbers are randomly generated.","C. If multiple conversations occur that are using the same service, the source port number is used to track the separate conversations.","D. Destination port numbers are assigned automatically and cannot be changed."],a:["C"]},
{q:"UDP and TCP belong to which layer of the TCP/IP protocol?",o:["A. Application","B. Transport","C. Internet","D. Network access"],a:["B"]},
{q:"Which name is assigned to the transport layer PDU?",o:["A. bits","B. data","C. frame","D. packet","E. segment"],a:["E"]},
{q:"What is the process of dividing a large data stream into smaller pieces prior to transmission?",o:["A. Sequencing","B. Duplexing","C. Multiplexing","D. segmentation"],a:["D"]},
{q:"Which two protocols may devices use in the application process that sends email? (Choose two.)",o:["A. HTTP","B. SMTP","C. POP","D. IMAP","E. DNS","F. POP3"],a:["B","F"],m:true},
{q:"What method can be used by two computers to ensure that packets are not dropped because too much data is being sent too quickly?",o:["A. encapsulation","B. flow control","C. access method","D. response timeout"],a:["B"]},

// === APPLICATION LAYER ===
{q:"What three application layer protocols are part of the TCP/IP protocol suite? (Choose three.)",o:["A. ARP","B. DHCP","C. DNS","D. FTP","E. NAT","F. PPP"],a:["B","C","D"],m:true},
{q:"What are the three common HTTP message types?",o:["A. GET, POST, PUT","B. GET, SEND, UPDATE","C. PUSH, PULL, SEND","D. REQUEST, SEND, UPDATE"],a:["A"]},
{q:"Which command is used to manually query a DNS server to resolve a specific host name?",o:["A. nslookup","B. ipconfig /displaysdns","C. tracert","D. net"],a:["A"]},
{q:"Which method allows a device to obtain an IPv6 address dynamically without the need for a DHCP server?",o:["A. Stateful DHCPv6","B. Stateless Address Autoconfiguration (SLAAC)","C. Manual Configuration","D. NAT64"],a:["B"]},
{q:"This is a function of the OSI session layer.",o:["A. compress and decompress data","B. provide an interface between applications","C. format data for the application layer","D. exchange of information to initiate dialog between peers"],a:["D"]},

// === DATA LINK LAYER ===
{q:"What is the primary role of the Data Link Layer in the OSI model?",o:["A. Providing reliable data transfer between network devices","B. Routing packets between networks","C. Encrypting network data for secure transmission","D. Managing user authentication and access control"],a:["A"]},
{q:"What is a frame in the context of the data link layer?",o:["A. A sequence of segments","B. A network path","C. An encapsulated Layer 3 packet","D. A router table entry"],a:["C"]},
{q:"Which layer of the OSI model is responsible for describing the methods for exchanging data frames over a common media?",o:["A. Network","B. Transport","C. Data Link","D. Physical"],a:["C"]},
{q:"The IEEE 802 LAN/MAN data link layer consists of which two sublayers? (Choose two.)",o:["A. Network Control Protocol","B. Logical Link Control","C. Media Access Control","D. Link Control Protocol"],a:["B","C"],m:true},
{q:"What are two services performed by the data link layer of the OSI model? (Choose two.)",o:["A. It fragments data packets into the MTU size.","B. It determines the path to forward packets.","C. It accepts Layer 3 packets and encapsulates them into frames.","D. It provides media access control and performs error detection.","E. It monitors the Layer 2 communication by building a MAC address table."],a:["C","D"],m:true},
{q:"Which three basic parts are common to all frame types supported by the data link layer? (Choose three.)",o:["A. header","B. type field","C. MTU size","D. data","E. trailer","F. CRC value"],a:["A","D","E"],m:true},
{q:"Which statement describes a characteristic of the frame header fields of the data link layer?",o:["A. They all include the flow control and logical connection fields.","B. Ethernet frame header fields contain Layer 3 source and destination addresses.","C. They vary depending on protocols.","D. They include information on user applications."],a:["C"]},
{q:"What is contained in the trailer of a data-link frame?",o:["A. logical address","B. physical address","C. data","D. error detection"],a:["D"]},
{q:"What is the function of the CRC value that is found in the FCS field of a frame?",o:["A. to verify the integrity of the received frame","B. to verify the physical address in the frame","C. to verify the logical address in the frame","D. to compute the checksum header for the data field in the frame"],a:["A"]},
{q:"What is the purpose of the FCS field in a frame?",o:["A. to obtain the MAC address of the sending node","B. to verify the logical address of the sending node","C. to compute the CRC header for the data field","D. to determine if errors occurred in the transmission and reception"],a:["D"]},
{q:"Which statement describes the half-duplex mode of data transmission?",o:["A. Data that is transmitted over the network can only flow in one direction.","B. Data that is transmitted over the network flows in both directions at the same time.","C. Data that is transmitted over the network flows in one direction to many different destinations simultaneously.","D. Data that is transmitted over the network flows in one direction at a time."],a:["D"]},
{q:"Which physical WAN topology connects multiple remote sites to a central location?",o:["A. Hub-and-Spoke","B. Point-to-Point","C. Mesh","D. Ring"],a:["A"]},
{q:"What is the special value assigned to the first 24 bits of a multicast MAC address transporting an IPv4 packet?",o:["A. 01-00-5E","B. FF-00-5E","C. 01-5E-00","D. FF-FF-FF"],a:["A"]},
{q:"When 2 or more bits in a data unit has been changed during the transmission, the error is called:",o:["A. random error","B. burst error","C. inverted error","D. double error"],a:["B"]},

// === SWITCHING ===
{q:"Under which two circumstances will a switch flood a frame out of every port except the port that the frame was received on? (Choose two.)",o:["A. The frame has the broadcast address as the destination address.","B. The destination address is unknown to the switch.","C. The source address in the frame header is the broadcast address.","D. The source address in the frame is a multicast address.","E. The destination address in the frame is a known unicast address."],a:["A","B"],m:true},
{q:"PC1 has sent a frame addressed to PC3. What will the switch do with the frame? (PC3's MAC is unknown to the switch)",o:["A. The switch will discard the frame.","B. The switch will forward the frame only to port 2.","C. The switch will forward the frame to all ports except port 4.","D. The switch will forward the frame to all ports.","E. The switch will forward the frame only to ports 1 and 3."],a:["C"]},
{q:"What happens if an Ethernet frame is less than 64 bytes?",o:["A. It is fragmented","B. It is considered valid","C. It is dropped","D. It is routed"],a:["C"]},
{q:"What happens when a switch receives a frame and the calculated CRC value is different than the value that is in the FCS field?",o:["A. The switch places the new CRC value in the FCS field and forwards the frame.","B. The switch notifies the source of the bad frame.","C. The switch drops the frame.","D. The switch floods the frame to all ports except the port through which the frame arrived to notify the hosts of the error."],a:["C"]},
{q:"What are two actions performed by a Cisco switch? (Choose two.)",o:["A. building a routing table that is based on the first IP address in the frame header","B. using the source MAC addresses of frames to build and maintain a MAC address table","C. forwarding frames with unknown destination IP addresses to the default gateway","D. utilizing the MAC address table to forward frames via the destination MAC address","E. examining the destination MAC address to add new entries to the MAC address table"],a:["B","D"],m:true},
{q:"Which network device has the primary function to send data to a specific destination based on the information found in the MAC address table?",o:["A. Hub","B. Router","C. Switch","D. Modem"],a:["C"]},
{q:"What will a host on an Ethernet network do if it receives a frame with a unicast destination MAC address that does not match its own MAC address?",o:["A. It will discard the frame.","B. It will forward the frame to the next host.","C. It will remove the frame from the media.","D. It will strip off the data-link frame to check the destination IP address."],a:["A"]},
{q:"Which frame forwarding method receives the entire frame and performs a CRC check to detect errors before forwarding the frame?",o:["A. cut-through switching","B. store-and-forward switching","C. fragment-free switching","D. fast-forward switching"],a:["B"]},
{q:"What are two examples of the cut-through switching method? (Choose two.)",o:["A. store-and-forward switching","B. fast-forward switching","C. CRC switching","D. fragment-free switching","E. QOS switching"],a:["B","D"],m:true},
{q:"Cut-through switching reduces latency but increases the risk of forwarding corrupted frames.",o:["A. True","B. False"],a:["A"]},
{q:"A Layer 2 switch is used to switch incoming frames from a 1000BASE-T port to a port connected to a 100Base-T network. Which method of memory buffering would work best?",o:["A. port-based buffering","B. level 1 cache buffering","C. shared memory buffering","D. fixed configuration buffering"],a:["C"]},
{q:"Which statement is true about the CSMA/CD access method that is used in Ethernet?",o:["A. When a device hears a carrier signal and transmits, a collision cannot occur.","B. A jamming signal causes only devices that caused the collision to execute a backoff algorithm.","C. All network devices must listen before transmitting.","D. Devices involved in a collision get priority to transmit after the backoff period."],a:["C"]},

{q:"A network administrator is measuring the transfer of bits across the company backbone. The administrator notices that the network throughput appears lower than the bandwidth expected. Which three factors could influence the differences in throughput? (Choose three.)",o:["A. the amount of traffic that is currently crossing the network","B. the sophistication of the encapsulation method applied to the data","C. the type of traffic that is crossing the network","D. the latency that is created by the number of network devices that the data is crossing","E. the bandwidth of the WAN connection to the Internet","F. the reliability of the gigabit Ethernet infrastructure of the backbone"],a:["A","C","D"],m:true},
{q:"What two criteria are used to help select a network medium from various network media? (Choose two.)",o:["A. the types of data that need to be prioritized","B. the cost of the end devices utilized in the network","C. the distance the selected medium can successfully carry a signal","D. the number of intermediate devices installed in the network","E. the environment where the selected medium is to be installed"],a:["C","E"],m:true},
{q:"Which of the following fiber-optic cable types can help data travel approximately 500 meters?",o:["A. Multimode","B. Single-mode"],a:["A"]},

{q:"Which two statements describe the characteristics of fiber-optic cabling? (Choose two.)",o:["A. Fiber-optic cabling does not conduct electricity.","B. Fiber-optic cabling has high signal loss.","C. Fiber-optic cabling is primarily used as backbone cabling.","D. Multimode fiber-optic cabling carries signals from multiple sending devices.","E. Fiber-optic cabling uses LEDs for single-mode cables and laser technology for multimode cables."],a:["A","C"],m:true},
{q:"What are two characteristics of fiber-optic cable? (Choose two.)",o:["A. It is not affected by EMI or RFI.","B. Each pair of cables is wrapped in metallic foil.","C. It combines the technique of cancellation, shielding, and twisting to protect data.","D. It typically contains 4 pairs of fiber-optic wires.","E. It is more expensive than UTP cabling is."],a:["A","E"],m:true},
{q:"With the use of unshielded twisted-pair copper wire in a network, what causes crosstalk within the cable pairs?",o:["A. the magnetic field around the adjacent pairs of wire","B. the use of braided wire to shield the adjacent wire pairs","C. the reflection of the electrical wave back from the far end of the cable","D. the collision caused by two nodes trying to use the media simultaneously"],a:["A"]},
{q:"Which type of UTP cable is used to connect a PC to a switch port?",o:["A. Console","B. Rollover","C. Crossover","D. Straight-through"],a:["D"]},
{q:"Which types of UTP cables are used for: 1-PC to console, 2-switch to switch, 3-PC to switch?",o:["A. 1 - rollover, 2 - crossover, 3 - straight-through","B. 1 - rollover, 2 - straight-through, 3 - crossover","C. 1 - crossover, 2 - straight-through, 3 - rollover","D. 1 - crossover, 2 - rollover, 3 - straight-through"],a:["A"]},

// === NETWORK LAYER & IP ===

{q:"Which OSI layer sends segments to be encapsulated in an IPv4 or IPv6 packet?",o:["A. Data link layer","B. Network layer","C. Transport layer","D. Session layer"],a:["C"]},
{q:"Which characteristic of IP does not guarantee that the packet will be delivered fully without errors?",o:["A. Connectionless","B. Best effort","C. Media independent"],a:["B"]},
{q:"Which statement describes a feature of the IP protocol?",o:["A. IP encapsulation is modified based on network media.","B. IP relies on Layer 2 protocols for transmission error control.","C. MAC addresses are used during the IP packet encapsulation.","D. IP relies on upper layer services to handle situations of missing or out-of-order packets."],a:["D"]},
{q:"Which field includes common values such as ICMP (1), TCP (6), and UDP (17)?",o:["A. Header Checksum","B. Time to live","C. Protocol","D. Differentiated Service (DS)"],a:["C"]},

{q:"Which two parts are components of an IPv4 address? (Choose two.)",o:["A. Logical portion","B. Network portion","C. Physical portion","D. Broadcast portion","E. Host portion","F. Subnet portion"],a:["B","E"],m:true},
{q:"What is the loopback address used for in IPv4 networking?",o:["A. To route packets to a different network","B. To test if the TCP/IP stack is functioning correctly","C. To identify the default gateway","D. To assign a dynamic IP address"],a:["B"]},
{q:"Which is true of the IPv6 packet header?",o:["A. The Hop Limit field replaces the IPv4 Time to Live field.","B. The Source and Destination IPv6 addresses change while traveling from source to destination.","C. The Time to Live field replaces the DiffServ field.","D. The Version field identifies the next header."],a:["A"]},
{q:"When transporting data from real-time applications, which field in the IPv6 header can be used to inform the routers and switches to maintain the same path for the packets in the same conversation?",o:["A. Next Header","B. Flow Label","C. Traffic Class","D. Differentiated Services"],a:["B"]},

// === ICMP ===
{q:"What is the primary purpose of the ICMP protocol?",o:["A. To route packets across different networks","B. To provide feedback about issues related to IP packet processing","C. To encrypt data before transmission","D. To assign IP addresses to devices"],a:["B"]},
{q:"What is the purpose of ICMP messages?",o:["A. to inform routers about network topology changes","B. to ensure the delivery of an IP packet","C. to provide feedback of IP packet transmissions","D. to monitor the process of a domain name to IP address resolution"],a:["C"]},
{q:"Which ICMP message is used to test the reachability of a host on an IP network?",o:["A. Destination Unreachable","B. Echo Request","C. Time Exceeded","D. Redirect"],a:["B"]},
{q:"What does the 'Time Exceeded' ICMP message indicate?",o:["A. The destination host is down","B. The packet's TTL has reached zero","C. The source address is unreachable","D. The network is congested"],a:["B"]},
{q:"Which ICMPv6 message is sent when the IPv6 hop limit field of a packet is decremented to zero and the packet cannot be forwarded?",o:["A. network unreachable","B. time exceeded","C. protocol unreachable","D. port unreachable"],a:["B"]},
{q:"Which field does ICMPv6 use instead of TTL to determine packet expiry?",o:["A. Time Delay","B. Packet Count","C. Hop Limit","D. Time Stamp"],a:["C"]},
{q:"A network admin disables ICMP on external-facing routers. Which two consequences may result from this configuration?",o:["A. Ping to public servers will time out","B. Traceroute will not show intermediate hops","C. Hosts cannot ping the default gateway internally","D. Router advertisements (RA) will be blocked"],a:["A","B"],m:true},
{q:"Which protocol is used by the traceroute command to send and receive echo-requests and echo-replies?",o:["A. SNMP","B. ICMP","C. Telnet","D. TCP"],a:["B"]},
{q:"Which tool uses the ICMP 'Time Exceeded' message to trace the path between two hosts?",o:["A. ping","B. netstat","C. traceroute","D. ipconfig"],a:["C"]},
{q:"What is a function of the tracert command that differs from the ping command when they are used on a workstation?",o:["A. The tracert command reaches the destination faster.","B. The tracert command shows the information of routers in the path.","C. The tracert command sends one ICMP message to each hop in the path.","D. The tracert command is used to test the connectivity between two devices."],a:["B"]},
{q:"A technician uses the ping 127.0.0.1 command. What is the technician testing?",o:["A. the TCP/IP stack on a network host","B. connectivity between two adjacent Cisco devices","C. connectivity between a PC and the default gateway","D. connectivity between two PCs on the same network","E. physical connectivity of a particular PC and the network"],a:["A"]},
{q:"A user who is unable to connect to the file server contacts the help desk. The helpdesk technician asks the user to ping the IP address of the default gateway. What is the purpose for this ping command?",o:["A. to obtain a dynamic IP address from the server","B. to request that gateway forward the connection request to the file server","C. to test that the host has the capability to reach hosts on other networks","D. to resolve the domain name of the file server to its IP address"],a:["C"]},
{q:"A network administrator is testing network connectivity by issuing the ping command on a router. Which symbol will be displayed to indicate that a time expired during the wait for an ICMP echo reply message?",o:["A. $","B. !","C. .","D. U"],a:["C"]},

// === ARP ===
{q:"What two functions are provided by ARP? (Choose two.)",o:["A. Maintains a table of IPv4 addresses to domain names","B. Maintains a table of IPv4 to MAC address mappings","C. Maintains a table of IPv6 to MAC address mappings","D. Resolves IPv4 addresses to domain names","E. Resolves IPv4 addresses to MAC addresses","F. Resolves IPv6 addresses to MAC addresses"],a:["B","E"],m:true},
{q:"Which destination address is used in an ARP request frame?",o:["A. 01-00-5E-00-AA-23","B. 0.0.0.0","C. FFFF.FFFF.FFFF","D. 255.255.255.255","E. 127.0.0.1"],a:["C"]},
{q:"How does the ARP process use an IPv4 address?",o:["A. to determine the MAC address of the remote destination host","B. to determine the MAC address of a device on the same network","C. to determine the amount of time a packet takes when traveling from source to destination","D. to determine the network number based on the number of bits in the IP address"],a:["B"]},
{q:"Which statement describes the treatment of ARP requests on the local link?",o:["A. They must be forwarded by all routers on the local network.","B. They are received and processed by every device on the local network.","C. They are dropped by all switches on the local network.","D. They are received and processed only by the target device."],a:["B"]},
{q:"What property of ARP causes cached IP-to-MAC mappings to remain in memory longer?",o:["A. Entries in an ARP table are time-stamped and are purged after the timeout expires.","B. A static IP-to-MAC address entry can be entered manually into an ARP table.","C. The type field 0x806 appears in the header of the Ethernet frame.","D. The port-to-MAC address table on a switch has the same entries as the ARP table on the switch."],a:["B"]},
{q:"Where are IPv4 addresses to Layer 2 Ethernet address mappings maintained on a host computer?",o:["A. neighbor table","B. ARP cache","C. routing table","D. MAC address table"],a:["B"]},
{q:"How can you view the ARP table on a Windows PC?",o:["A. arp -a","B. show arp","C. netstat -r","D. ipconfig /all"],a:["A"]},
{q:"What is the aim of an ARP spoofing attack?",o:["A. to flood the network with ARP reply broadcasts","B. to fill switch MAC address tables with bogus addresses","C. to associate IP addresses to the wrong MAC address","D. to overwhelm network hosts with ARP requests"],a:["C"]},
{q:"What are two potential network problems that can result from ARP operation? (Choose two.)",o:["A. Manually configuring static ARP associations could facilitate ARP poisoning or MAC address spoofing.","B. On large networks with low bandwidth, multiple ARP broadcasts could cause data communication delays.","C. Network attackers could manipulate MAC address and IP address mappings in ARP messages with the intent of intercepting network traffic.","D. Large numbers of ARP request broadcasts could cause the host MAC address table to overflow and prevent the host from communicating on the network.","E. Multiple ARP replies result in the switch MAC address table containing entries that match the MAC addresses of hosts that are connected to the relevant switch port."],a:["B","C"],m:true},

{q:"What is the purpose of the IPv6 Neighbor Discovery Protocol (ND)?",o:["A. To replace ARP in IPv6 networks","B. To discover the best route between networks","C. To allow IPv6 devices to communicate using NAT","D. A and B"],a:["A"]},
{q:"What is the purpose of the Neighbor Solicitation (NS) message in ICMPv6?",o:["A. To discover the MAC address of a neighboring device","B. To request an IPv6 address from a router","C. To check the reachability of a host","D. To test the link quality"],a:["A"]},

{q:"A user executes a traceroute over IPv6. At what point would a router in the path drop the packet?",o:["A. when the value of the Hop Limit field reaches 255","B. when the value of the Hop Limit field reaches zero","C. when the router receives an ICMP time exceeded message","D. when the target host responds with an ICMP echo reply message"],a:["B"]},
{q:"Why is NAT not needed in IPv6?",o:["A. Because IPv6 has integrated security, there is no need to hide the IPv6 addresses of internal networks.","B. Any host or user can get a public IPv6 network address because the number of available IPv6 addresses is extremely large.","C. The problems that are induced by NAT applications are solved because the IPv6 header improves packet handling by intermediate routers.","D. The end-to-end connectivity problems that are caused by NAT are solved because the number of routes increases with the number of nodes that are connected to the Internet."],a:["B"]},

{q:"What destination MAC address would be included in a frame sent from a source device to a destination device on a remote local network?",o:["A. A broadcast MAC address of FF-FF-FF-FF-FF-FF.","B. The MAC address of the destination device.","C. The MAC address of the local router interface."],a:["C"]},
{q:"What will happen if the default gateway address is incorrectly configured on a host?",o:["A. The host cannot communicate with other hosts in the local network.","B. The switch will not forward packets initiated by the host.","C. The host will have to use ARP to determine the correct address of the default gateway.","D. The host cannot communicate with hosts in other networks.","E. A ping from the host to 127.0.0.1 would not be successful."],a:["D"]},
{q:"Within a production network, what is the purpose of configuring a switch with a default gateway address?",o:["A. Hosts that are connected to the switch can use the switch default gateway address to forward packets to a remote destination.","B. A switch must have a default gateway to be accessible by Telnet and SSH.","C. The default gateway address is used to forward packets originating from the switch to remote networks.","D. It provides a next-hop address for all traffic that flows through the switch."],a:["C"]},
{q:"A web client is receiving a response for a web page from a web server. From the perspective of the client, what is the correct order of the protocol stack used to decode the received transmission?",o:["A. Ethernet, IP, TCP, HTTP","B. HTTP, TCP, IP, Ethernet","C. Ethernet, TCP, IP, HTTP","D. HTTP, Ethernet, IP, TCP"],a:["A"]},
{q:"For the TCP/IP protocol suite, what is the correct order of events when a Telnet message is being prepared to be sent over the network? (1-Telnet data, 2-TCP header, 3-IP header, 4-Ethernet header)",o:["A. 1C-2B-3D-4A","B. 1C-2D-3B-4A","C. 1A-2B-3C-4D","D. 1B-2A-3D-4C"],a:["B"]},
{q:"Which statement accurately describes a TCP/IP encapsulation process when a PC is sending data to the network?",o:["A. Data is sent from the internet layer to the network access layer.","B. Packets are sent from the network access layer to the transport layer.","C. Segments are sent from the transport layer to the internet layer.","D. Frames are sent from the network access layer to the internet layer."],a:["C"]},
{q:"ServerB is attempting to contact HostA. Which two statements correctly identify the addressing that ServerB will generate in the process? (Choose two.)",o:["A. ServerB will generate a packet with the destination IP address of RouterB.","B. ServerB will generate a frame with the destination MAC address of SwitchB.","C. ServerB will generate a packet with the destination IP address of RouterA.","D. ServerB will generate a frame with the destination MAC address of RouterB.","E. ServerB will generate a packet with the destination IP address of HostA.","F. ServerB will generate a frame with the destination MAC address of RouterA."],a:["E","F"],m:true},

{q:"What is the effect of using the Router# copy running-config startup-config command on a router?",o:["A. The contents of ROM will change.","B. The contents of RAM will change.","C. The contents of NVRAM will change.","D. The contents of flash will change."],a:["C"]},

// === SECURITY & PASSWORDS ===
{q:"To secure privileged EXEC mode on a Cisco device, which command is recommended?",o:["A. password cisco","B. enable password class","C. service password-encryption","D. enable secret class"],a:["D"]},
{q:"Which command is used to secure privileged EXEC mode on a switch?",o:["A. password","B. enable secret","C. login","D. service password-encryption"],a:["B"]},
{q:"What does a network administrator accomplish by entering the service password-encryption command?",o:["A. This command encrypts passwords as they are transmitted across serial WAN links.","B. This command prevents someone from viewing the running configuration passwords.","C. This command enables a strong encryption algorithm for the enable secret password command.","D. This command automatically encrypts passwords in configuration files that are currently stored in NVRAM.","E. This command provides an exclusive encrypted password for external service personnel who are required to do router maintenance."],a:["B"]},
{q:"What command will prevent all unencrypted passwords from displaying in plain text in a configuration file?",o:["A. (config)# enable password secret","B. (config)# enable secret Secret_Password","C. (config-line)# password secret","D. (config)# service password-encryption","E. (config)# enable secret Encrypted_Password"],a:["D"]},
{q:"Passwords can be used to restrict access to all or parts of the Cisco IOS. Select the modes and interfaces that can be protected with passwords. (Choose three.)",o:["A. VTY interface","B. console interface","C. Ethernet interface","D. boot IOS mode","E. privileged EXEC mode","F. router configuration mode"],a:["A","B","E"],m:true},
{q:"What is the correct sequence of commands to configure a console password on a switch?",o:["A. line console 0 → password cisco → login","B. enable password cisco → login → password cisco","C. enable console → password cisco → encrypt password","D. password cisco → enable password → encrypt password"],a:["A"]},
{q:"Which three commands are used to set up secure access to a router through a connection to the console interface? (Choose three.)",o:["A. interface fastethernet 0/0","B. line vty 0 4","C. line console 0","D. enable secret cisco","E. login","F. password cisco"],a:["C","E","F"],m:true},

// === REMOTE ACCESS ===
{q:"Which access method would be the most appropriate in-band access to the IOS over a network connection?",o:["A. Console","B. Telnet/SSH","C. Aux"],a:["B"]},
{q:"Which access method would be most appropriate if you were in the equipment room with a new switch that needs to be configured?",o:["A. Console","B. Telnet/SSH","C. Aux"],a:["A"]},
{q:"How is SSH different from Telnet?",o:["A. SSH makes connections over the network, whereas Telnet is for out-of-band access.","B. SSH provides security to remote sessions by encrypting messages and using user authentication. Telnet is considered insecure and sends messages in plaintext.","C. SSH requires the use of the PuTTY terminal emulation program. Tera Term must be used to connect to devices through the use of Telnet.","D. SSH must be configured over an active network connection, whereas Telnet is used to connect to a device from a console connection."],a:["B"]},
{q:"What happens when the transport input ssh command is entered on the switch vty lines?",o:["A. The SSH client on the switch is enabled.","B. Communication between the switch and remote users is encrypted.","C. The switch requires a username/password combination for remote access.","D. The switch requires remote connections via a proprietary client software."],a:["B"]},
{q:"Which interface allows remote management of a Layer 2 switch?",o:["A. the AUX interface","B. the console port interface","C. the switch virtual interface","D. the first Ethernet port interface"],a:["C"]},
{q:"What is the default SVI on a Cisco switch?",o:["A. VLAN99","B. VLAN1","C. VLAN100","D. VLAN0"],a:["B"]},
{q:"Why would a Layer 2 switch need an IP address?",o:["A. to enable the switch to send broadcast frames to attached PCs","B. to enable the switch to function as a default gateway","C. to enable the switch to be managed remotely","D. to enable the switch to receive frames from attached PCs"],a:["C"]},
{q:"Which command is used to configure a default gateway on a Cisco switch?",o:["A. ip default-gateway","B. ip route","C. gateway default","D. interface vlan1"],a:["A"]},
{q:"The global configuration command ip default-gateway 172.16.100.1 is applied to a switch. What is the effect of this command?",o:["A. The switch will have a management interface with the address 172.16.100.1.","B. The switch can be remotely managed from a host on another network.","C. The switch can communicate with other hosts on the 172.16.100.0 network.","D. The switch is limited to sending and receiving frames to and from the gateway 172.16.100.1."],a:["B"]},

// === NETWORK CONCEPTS ===
{q:"Which of the four basic characteristics of a reliable network architecture refers to the ability to quickly and easily expand to support new users and applications?",o:["A. Fault Tolerance","B. Scalability","C. Quality of Service (QoS)","D. Security"],a:["B"]},
{q:"Which type of network topology lets you see the actual location of intermediary devices and cable installation?",o:["A. Physical topology","B. Logical topology"],a:["A"]},
{q:"Which topology displays networking device layer IP addresses?",o:["A. Aerial topology","B. IP address topology","C. Logical topology","D. Physical topology"],a:["C"]},
{q:"Which of the following best describes a 'host' in a network?",o:["A. A network cable that connects devices","B. A computer that connects directly to a network","C. A device that controls access to the network","D. A wireless signal used for communication"],a:["B"]},
{q:"Which of the following is the name for all computers connected to a network that participate in sending and receiving data directly in network communication?",o:["A. Servers","B. Intermediary devices","C. Hosts","D. Media"],a:["C"]},
{q:"Which of the following is not a key element of communication?",o:["A. Network speed","B. A source (sender)","C. A destination (receiver)","D. A transmission medium (channel)"],a:["A"]},
{q:"Which statement is correct about network protocols?",o:["A. Network protocols define the type of hardware that is used and how it is mounted in racks.","B. They define how messages are exchanged between the source and the destination.","C. They all function in the network access layer of TCP/IP.","D. They are only required for exchange of messages between devices on remote networks."],a:["B"]},
{q:"What type of communication will send a message to all devices on a local area network?",o:["A. Broadcast","B. Unicast","C. Allcast","D. multicast"],a:["A"]},
{q:"What term describes a type of network used by people who work from home or from a small remote office?",o:["A. SOHO network","B. BYOD","C. quality of service","D. converged network"],a:["A"]},
{q:"What characteristic describes spyware?",o:["A. software that is installed on a user device and collects information about the user","B. an attack that slows or crashes a device or network service","C. the use of stolen credentials to access private data","D. a network device that filters access and traffic coming into a network"],a:["A"]},
{q:"A networking technician is working on the wireless network at a medical clinic. The technician accidentally sets up the wireless network so that patients can see the medical records data of other patients. Which of the network characteristics has been violated?",o:["A. fault tolerance","B. scalability","C. security","D. Quality of Service (QoS)","E. reliability"],a:["C"]},
{q:"What is the auto-MDIX feature on a switch?",o:["A. The automatic configuration of an interface for 10/100/1000 Mb/s operation","B. The automatic configuration of an interface for a straight-through or a crossover Ethernet cable connection","C. The automatic configuration of full-duplex operation over a single Ethernet copper or optical cable","D. The ability to turn a switch interface on or off accordingly if an active connection is detected"],a:["B"]},
{q:"A network administrator is connecting two modern switches using a straight-through cable. The switches are new and have never been configured. Which three statements are correct about the final result of the connection? (Choose three.)",o:["A. The link between the switches will work at the fastest speed that is supported by both switches.","B. The link between switches will work as full-duplex.","C. If both switches support different speeds, they will each work at their own fastest speed.","D. The auto-MDIX feature will configure the interfaces eliminating the need for a crossover cable.","E. The connection will not be possible unless the administrator changes the cable to a crossover cable.","F. The duplex capability has to be manually configured because it cannot be negotiated."],a:["A","B","D"],m:true},
{q:"Which statement describes the use of powerline networking technology?",o:["A. New 'smart' electrical cabling is used to extend an existing home LAN.","B. A home LAN is installed without the use of physical cabling.","C. A device connects to an existing home LAN using an adapter and an existing electrical outlet.","D. Wireless access points use powerline adapters to distribute data through the home LAN."],a:["C"]},
{q:"An employee at a branch office needs to access confidential pricing information from internal servers at the Head Office. What type of network would the employee access?",o:["A. an intranet","B. the Internet","C. an extranet","D. a local area network"],a:["A"]},
{q:"Which PDU is processed when a host computer is de-encapsulating a message at the transport layer of the TCP/IP model?",o:["A. Bits","B. Frame","C. Packet","D. Segment"],a:["D"]},
{q:"What is necessary to plan and use when implementing a network?",o:["A. device names","B. IP addressing scheme","C. MAC addressing scheme","D. printer location"],a:["B"]},
{q:"A small advertising company has a web server connected to the Internet through a leased line. Which approach best provides cost effective redundancy for the Internet connection?",o:["A. Add a second NIC to the web server.","B. Add another web server to prepare failover support.","C. Add a connection to the Internet via a DSL line to another ISP.","D. Add multiple connections between the switches and the edge router."],a:["C"]},
{q:"Which type of network topology lets you see where intermediary devices and cable installations are physically located?",o:["A. Physical topology","B. Logical topology","C. Network topology","D. WAN topology"],a:["A"]},
{q:"Match requirements of a reliable network with supporting network architecture: fault tolerance=?, scalability=?, security=?",o:["A. fault tolerance=redundant links, scalability=expand without degrading service, security=protect unauthorized access","B. fault tolerance=redundant links, scalability=protect unauthorized access, security=expand without degrading service","C. fault tolerance=high speed links, scalability=type of communication priority, security=redundant links","D. fault tolerance=type of communication priority, scalability=redundant links, security=expand without degrading service"],a:["A"]}
];

// =================== STATE ===================
let questions=[],ci=0,selected=[],answered=false,score=0,wc=0,sc=0,hist=[],chosenN=10;

// =================== INIT ===================
document.getElementById('totalInfo').textContent=`Ngân hàng: ${Q.length} câu hỏi`;
document.getElementById('modeGrid').addEventListener('click',e=>{
  const c=e.target.closest('.mode-card');if(!c)return;
  document.querySelectorAll('.mode-card').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');chosenN=parseInt(c.dataset.n);
});
document.getElementById('startBtn').addEventListener('click',()=>{
  const s=[...Q].sort(()=>Math.random()-0.5);
  questions=chosenN===0?s:s.slice(0,Math.min(chosenN,s.length));
  document.getElementById('welcome').classList.add('hide');
  document.getElementById('quiz').style.display='block';
  document.getElementById('sTotal').textContent=questions.length;
  ci=0;score=0;wc=0;sc=0;hist=[];loadQ();
});

function loadQ(){
  const q=questions[ci];answered=false;selected=[];
  const card=document.getElementById('qCard');
  card.style.animation='none';card.offsetHeight;card.style.animation='slideIn 0.35s ease both';
  document.getElementById('qNum').textContent=`QUESTION ${String(ci+1).padStart(2,'0')} / ${questions.length}`;
  document.getElementById('qText').textContent=q.q;
  const multi=q.m||q.a.length>1;
  document.getElementById('multiBadge').innerHTML=multi?'<span class="multi-badge">✓ Chọn nhiều đáp án</span>':'';
  const container=document.getElementById('opts');container.innerHTML='';
  q.o.forEach(opt=>{
    const letter=opt.charAt(0),text=opt.slice(3);
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-letter">${letter}</span><span style="flex:1">${text}</span><span class="opt-icon"></span>`;
    btn.addEventListener('click',()=>pickOpt(btn,letter,multi));
    container.appendChild(btn);
  });
  document.getElementById('expl').className='expl';
  document.getElementById('sCur').textContent=ci+1;
  document.getElementById('sOk').textContent=score;
  document.getElementById('sWrong').textContent=wc;
  const pct=Math.round(ci/questions.length*100);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pLabel').textContent=`Câu ${ci+1} / ${questions.length}`;
  document.getElementById('pPct').textContent=pct+'%';
  document.getElementById('submitBtn').disabled=true;
  document.getElementById('submitBtn').style.display='inline-flex';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('skipBtn').style.display='inline-flex';
}

function pickOpt(btn,letter,multi){
  if(answered)return;
  if(!multi){
    document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
    selected=[letter];btn.classList.add('selected');
  }else{
    const i=selected.indexOf(letter);
    if(i>-1){selected.splice(i,1);btn.classList.remove('selected')}
    else{selected.push(letter);btn.classList.add('selected')}
  }
  document.getElementById('submitBtn').disabled=selected.length===0;
}

document.getElementById('submitBtn').addEventListener('click',()=>{
  if(answered||selected.length===0)return;
  answered=true;
  const q=questions[ci];
  const correct=q.a.slice().sort().join('')===selected.slice().sort().join('');
  if(correct)score++;else wc++;
  hist.push({q,selected:[...selected],correct});
  document.querySelectorAll('.opt-btn').forEach(btn=>{
    const letter=btn.querySelector('.opt-letter').textContent;
    const isC=q.a.includes(letter),isSel=selected.includes(letter);
    btn.disabled=true;
    if(isSel&&isC){btn.classList.add('correct');btn.querySelector('.opt-icon').textContent='✓'}
    else if(isSel&&!isC){btn.classList.add('wrong');btn.querySelector('.opt-icon').textContent='✗'}
    else if(!isSel&&isC){btn.classList.add('show-correct');btn.querySelector('.opt-icon').textContent='✓'}
  });
  if(q.x){const el=document.getElementById('expl');el.textContent='💡 '+q.x;el.classList.add('show')}
  document.getElementById('sOk').textContent=score;
  document.getElementById('sWrong').textContent=wc;
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('skipBtn').style.display='none';
  document.getElementById('nextBtn').style.display='inline-flex';
  document.getElementById('nextBtn').textContent=ci<questions.length-1?'Tiếp theo →':'Xem kết quả →';
});

document.getElementById('skipBtn').addEventListener('click',()=>{
  sc++;hist.push({q:questions[ci],selected:[],correct:false,skipped:true});go();
});
document.getElementById('nextBtn').addEventListener('click',go);
function go(){ci++;if(ci>=questions.length)showResult();else loadQ();}

function showResult(){
  document.getElementById('quiz').style.display='none';
  const res=document.getElementById('result');res.classList.add('show');
  const total=questions.length,pct=Math.round(score/total*100);
  document.getElementById('rPct').textContent=pct+'%';
  document.getElementById('rSub').textContent=`${score} / ${total} câu đúng`;
  document.getElementById('rOk').textContent=score;
  document.getElementById('rWr').textContent=wc;
  document.getElementById('rSk').textContent=sc;
  let emoji,rank,bg;
  if(pct>=90){emoji='🏆';rank='XUẤT SẮC';bg='linear-gradient(135deg,#ffd700,#ff8c00)'}
  else if(pct>=75){emoji='🎉';rank='GIỎI';bg='linear-gradient(135deg,#00e676,#00b248)'}
  else if(pct>=60){emoji='👍';rank='KHÁ';bg='linear-gradient(135deg,#00d4ff,#0066ff)'}
  else if(pct>=40){emoji='📚';rank='TRUNG BÌNH';bg='linear-gradient(135deg,#ffb300,#e65100)'}
  else{emoji='💪';rank='CẦN CỐ GẮNG';bg='linear-gradient(135deg,#ff4444,#aa0000)'}
  document.getElementById('rEmoji').textContent=emoji;
  const rb=document.getElementById('rBadge');rb.textContent=rank;rb.style.background=bg;
}

document.getElementById('reviewBtn').addEventListener('click',()=>{
  const sec=document.getElementById('reviewSection'),list=document.getElementById('reviewList');
  if(sec.style.display==='block'){sec.style.display='none';return}
  sec.style.display='block';list.innerHTML='';
  hist.forEach((h,i)=>{
    const div=document.createElement('div');
    div.className=`rev-item ${h.correct?'ok':'ng'}`;
    const qt=h.q.q.length>110?h.q.q.slice(0,110)+'…':h.q.q;
    let html='';
    if(h.skipped){html='<span class="ans-tag wrong">Bỏ qua</span>'}
    else{
      h.selected.forEach(s=>{html+=`<span class="ans-tag ${h.q.a.includes(s)?'right':'wrong'}">Chọn: ${s}</span>`});
      if(!h.correct)h.q.a.forEach(a=>{if(!h.selected.includes(a))html+=`<span class="ans-tag correct">Đúng: ${a}</span>`});
    }
    div.innerHTML=`<div class="rev-q"><span class="rev-n">Q${i+1}</span><span>${qt}</span></div><div class="rev-ans">${html}</div>`;
    list.appendChild(div);
  });
});

document.getElementById('restartBtn').addEventListener('click',()=>{
  ci=0;score=0;wc=0;sc=0;hist=[];questions=[];
  document.getElementById('result').classList.remove('show');
  document.getElementById('reviewSection').style.display='none';
  document.getElementById('welcome').classList.remove('hide');
});
</script>
</body>
</html>
